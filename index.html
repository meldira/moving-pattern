<!doctype html>
<html>
    <head>
        <meta charset="utf-8" />
        <title>Moving Pattern</title>
        <style>
            body {
                margin: 0;
                width: 100vw;
                height: 100vh;
                overflow: hidden;
                background-color: black;
            }
        </style>
    </head>
    <body>
        <canvas id="moving-pattern-canvas"></canvas>
        <script>
            const canvas = document.getElementById("moving-pattern-canvas");
            const context = canvas.getContext("2d");
            let points = [];
            let maximumPointConnectionDistance;
            let maximumConnectionLineThickness;
            function draw() {
                context.fillStyle = "black";
                context.fillRect(0, 0, canvas.width, canvas.height);
                for (let i = 0; i < points.length; i++) {
                    for (let j = i + 1; j < points.length; j++) {
                        let distanceBetweenPoints = Math.sqrt(Math.pow(points[j].x - points[i].x, 2) + Math.pow(points[j].y - points[i].y, 2));
                        if (distanceBetweenPoints < maximumPointConnectionDistance) {
                            const connectionStrength = 1 - (distanceBetweenPoints / maximumPointConnectionDistance);
                            context.lineWidth = maximumConnectionLineThickness * connectionStrength;
                            context.strokeStyle = `rgba(${points[i].colorValues.red + (points[j].colorValues.red - points[i].colorValues.red) * 0.5}, ${points[i].colorValues.green + (points[j].colorValues.green - points[i].colorValues.green) * 0.5}, ${points[i].colorValues.blue + (points[j].colorValues.blue - points[i].colorValues.blue) * 0.5}, ${connectionStrength})`;
                            context.beginPath();
                            context.moveTo(points[i].x, points[i].y);
                            context.lineTo(points[j].x, points[j].y);
                            context.stroke();
                        }
                    }
                    points[i].x += points[i].xSpeed;
                    points[i].y += points[i].ySpeed;
                    if (points[i].x < 0 || points[i].x > canvas.width) {
                        points[i].xSpeed *= -1;
                    }
                    if (points[i].y < 0 || points[i].y > canvas.height) {
                        points[i].ySpeed *= -1;
                    }
                }
                requestAnimationFrame(draw);
            }
            function arrangePointsBasedOnCanvasSize() {
                points = [];
                const canvasDiagonalLength = Math.sqrt(Math.pow(canvas.width, 2) + Math.pow(canvas.height, 2));
                const newPointSpeed = canvasDiagonalLength / 900;
                maximumPointConnectionDistance = canvasDiagonalLength / 10;
                maximumConnectionLineThickness = canvasDiagonalLength / 800;
                for (let i = 0; i < 300; i++) {
                    const pointInitialDirection = Math.random() * Math.PI * 2;
                    points.push({
                        x: Math.random() * canvas.width,
                        y: Math.random() * canvas.height,
                        xSpeed: Math.sin(pointInitialDirection) * newPointSpeed,
                        ySpeed: Math.cos(pointInitialDirection) * newPointSpeed,
                        colorValues: {
                            red: Math.random() * 255,
                            green: Math.random() * 255,
                            blue: Math.random() * 255
                        }
                    });
                }
            }
            function matchCanvasSizeToWindow() {
                canvas.width = window.innerWidth
                canvas.height = window.innerHeight;
                arrangePointsBasedOnCanvasSize();
            }
            matchCanvasSizeToWindow();
            onresize = matchCanvasSizeToWindow;
            requestAnimationFrame(draw);
        </script>
    </body>
</html>
